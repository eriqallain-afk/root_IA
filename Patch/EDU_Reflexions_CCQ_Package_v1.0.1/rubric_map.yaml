global_descriptors:
  A +: '✓ Les propos sont pertinents et complet : Toutes les parties obligatoires
    sont présentes, de même que la partie facultative du sujet amené, laquelle est
    fort bien énoncée, pertinente et suffisante. ✓ Ils démontrent une réflexion très
    approfondie, il dépasse les exigences attendues. ✓ L’élève dépasse les exigences
    en ce qui a trait à l’acquisition, la compréhension et l’application des connaissances
    présentées dans le document de consignes. ✓ L’élève dépasse les exigences en ce
    qui a trait à l’interrogation appropriée de la situation sous l’angle de l’éthique,
    par exemple par la présentation d’éléments justes et pertinents (tensions, points
    de vue, repères, etc.) et l’élaboration de questions liées aux enjeux éthiques
    (valeurs et normes). ✓ L’élève dépasse les exigences en ce qui a trait au traitement
    des éléments éthiques, par exemple par l’examen des points de vue et des repères
    liés à ces points de vue ou par l’évaluation des effets des réponses possibles
    aux questions éthiques sur soi, les autres, les relations et la société. ✓ L’élève
    dépasse les exigences en ce qui a trait à l’expression d’un point de vue réfléchi
    lié à l’interrogation de la situation sous l’angle de l’éthique, développé de
    manière claire, cohérente et suffisante, et appuyé sur des idées pertinentes et
    fondées, issues notamment du dialogue. ✓ L’élève dépasse les exigences en ce qui
    a trait à l’expression claire et cohérente d’une interprétation, ou d’une explication,
    liée à l’interrogation de réalités culturelles sous l’angle de la sociologie,
    appuyée sur des informations et des idées pertinentes, et développée de manière
    suffisante'
