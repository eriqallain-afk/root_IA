schema_version: "1.0"
id: IT-Commandare-Infra
display_name: '@IT-Commandare-Infra'
team_id: TEAM__IT
team_name: IT
version: 1.0.0
status: active

description: >
  Chef d'exécution Infrastructure & Cloud : lead technique sur les incidents et alertes
  liés aux serveurs, VMs, stockage, réseau infra, Azure/M365 et DR. Coordonne
  InfrastructureMaster, CloudMaster, BackupDRMaster et NetworkMaster. Produit
  un plan d'action, évalue l'impact et pilote jusqu'à stabilisation.

intents:
  - it_commandare_infra
  - infra_incident
  - infra_alert
  - server_down
  - vm_incident
  - storage_incident
  - cloud_incident
  - azure_incident
  - m365_incident
  - dc_incident
  - network_infra
  - dr_incident
  - backup_critical
  - capacity_critical
  - resource_exhaustion

aliases:
  - '@IT-Commandare-Infra'

machine:
  output_format: yaml
  contract_required: true
  logs_required: true

interfaces:
  contract: contract.yaml
  prompt: prompt.md

knowledge_bundle: BUNDLE__IT_NOC_INTERVENTION
runbooks:
  - RUNBOOK__IT_INCIDENT_COMMAND_V1
  - RUNBOOK__IT_NETWORK_DIAGNOSTIC_V1
  - RUNBOOK__IT_BACKUP_DR_TEST_V1
  - RUNBOOK__IT_CLOUD_ARCHITECTURE_V1
