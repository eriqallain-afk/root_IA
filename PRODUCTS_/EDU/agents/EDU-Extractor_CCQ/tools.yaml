schema_version: '1.0'
name: '@EDU-Extractor_CCQ tooling'
operators:
- id: PDF_TEXT_EXTRACT
  description: Extrait le texte natif d'un PDF (si présent).
  inputs:
  - name: pdf_path
    type: file
  outputs:
  - name: text
    type: string
  - name: pages_with_text
    type: array<int>
- id: PDF_RENDER_PAGES
  description: Rend chaque page du PDF en image (PNG) pour OCR/vision.
  inputs:
  - name: pdf_path
    type: file
  outputs:
  - name: page_images
    type: array<image>
  - name: page_count
    type: int
- id: VISION_TRANSCRIBE_PAGES
  description: Transcrit le texte des pages images via vision (équivalent OCR).
  inputs:
  - name: page_images
    type: array<image>
  outputs:
  - name: page_texts
    type: array<string>
  - name: confidence
    type: string
  - name: flags
    type: array<string>
- id: TEXT_MERGE_NORMALIZE
  description: Fusionne texte natif + transcriptions; normalise espaces et marqueurs
    [INCERTAIN]/[ILLISIBLE].
  inputs:
  - name: native_text
    type: string
  - name: page_texts
    type: array<string>
  outputs:
  - name: full_text
    type: string
  - name: ocr_used
    type: boolean
- id: DOC_SPLIT_BY_STUDENT
  description: Découpe un texte complet en sous-documents par élève (Student_01, Student_02…).
  inputs:
  - name: full_text
    type: string
  outputs:
  - name: student_docs
    type: array<object>
- id: SECTION_DETECT
  description: Détecte/infère les 5 sections (Introduction, Synopsis, Tensions éthiques,
    Choix éthiques, Conclusion).
  inputs:
  - name: student_text
    type: string
  outputs:
  - name: sections
    type: array<object>
  - name: segmentation_confidence
    type: string
- id: RUBRIC_RETRIEVE
  description: Récupère les passages pertinents de la grille/barème pour une section
    donnée.
  inputs:
  - name: section_name
    type: string
  outputs:
  - name: rubric_refs
    type: array<string>
- id: EVALUATE_SECTION
  description: Évalue une section selon les références de grille/barème et produit
    points, cote, justification.
  inputs:
  - name: section
    type: object
  - name: rubric_refs
    type: array<string>
  outputs:
  - name: section_result
    type: object
  - name: flagged
    type: boolean
- id: COMPILE_BATCH_REPORT
  description: Compile un résumé batch et agrège les résultats par élève.
  inputs:
  - name: items
    type: array<object>
  outputs:
  - name: batch_result
    type: object
- id: SCHEMA_VALIDATE
  description: Valide la sortie contre OUTPUT_SCHEMA.json.
  inputs:
  - name: result
    type: object
  - name: schema_path
    type: file
  outputs:
  - name: valid
    type: boolean
  - name: errors
    type: array<string>
