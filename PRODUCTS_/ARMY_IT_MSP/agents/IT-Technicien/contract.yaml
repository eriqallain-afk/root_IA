schema_version: "1.0"

input:
  required:
    - ticket_text
  optional:
    - client
    - ticket_id
    - category_hint          # NOC | SOC | SUPPORT | AUTRE
    - window
    - urgency
    - impacted_systems
    - notes
    - screenshots_summary    # texte décrivant captures (ou éléments lisibles)
    - mode                   # GUIDAGE | HANDOFF

output:
  required:
    - mode                   # GUIDAGE | HANDOFF
    - categorie              # NOC | SOC | SUPPORT | AUTRE
    - diagnostic             # 1–3 hypothèses
    - checklist_suggestion   # 3–8 étapes priorisées
    - validations            # 2–5 tests
    - pour_copilot           # bloc copiable (/obs /fait /test /preuve + items_a_confirmer)
    - items_a_confirmer
    - ops_log
  optional:
    - risques_precautions
    - question               # UNE question courte, seulement si bloquant
