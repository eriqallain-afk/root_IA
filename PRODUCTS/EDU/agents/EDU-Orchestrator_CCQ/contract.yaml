schema_version: '1.0'
input:
  accepts:
  - batch
  - images
  - pdf
  - pdf_scans
  - text
  - text_optional
  required:
  - mode
  - source
  notes: Orchestre extraction/transcription CCQ → évaluation → supervision invisible
    → QA contrat. Doit respecter les contrats des sous-agents (EDU-Extractor_CCQ,
    EDU-Reflexions_CCQ) et conserver une traçabilité des outputs.
output:
  format: YAML_STRICT
  fields:
    mode: single|batch
    pipeline: list<{stage:str, actor_id:str, status:str, notes?:str}>
    extraction: object (sortie EDU-Extractor_CCQ, optionnel si texte fourni)
    evaluations: object|list<object> (sortie EDU-Reflexions_CCQ)
    supervision: object (optionnel)
    qa: object (optionnel)
    flags: list<str>
    next_actions: list<str>
    metadata: '{timestamp:str, versions: list<{actor_id:str, version:str}>}'
    missing_fields: list<str> (optionnel)
