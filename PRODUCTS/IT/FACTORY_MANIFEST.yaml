    description: Ticket -> diagnostic -> comms -> KB
    actors: [IT-TicketScribe, IT-SupportMaster, IT-CommsMSP, IT-KnowledgeKeeper]

  - id: IT_INCIDENT_TRIAGE
    description: NOC triage -> dispatch -> remediation -> report -> archive
    actors: [IT-Commandare-NOC, IT-NOCDispatcher, IT-Commandare-TECH, IT-ReportMaster, OPS-DossierIA]

  - id: IT_COMMANDARE_NOC
    description: Triage/diagnostic NOC direct
    actors: [IT-Commandare-NOC]

  - id: IT_COMMANDARE_TECH
    description: RCA + remediation
    actors: [IT-OrchestratorMSP, IT-Commandare-TECH, OPS-DossierIA]

  - id: IT_COMMANDARE_OPR
    description: Gouvernance ops, coordination & controle
    actors: [IT-Commandare-OPR]

  - id: IT_CHANGE_EXEC
    description: Change management complet
    actors: [IT-Commandare-TECH, IT-NOCDispatcher, IT-ReportMaster, OPS-DossierIA]

  - id: IT_NOC_DISPATCH
    description: Dispatch NOC initial
    actors: [IT-Commandare-NOC]

  - id: IT_MSP_LIVE_ASSIST
    description: Assistance live temps reel
    actors: [IT-MSPLiveAssistant]

  - id: IT_CW_INTERVENTION_LIVE_CLOSE
    description: Intervention live -> KB
    actors: [IT-InterventionCopilot, IT-KnowledgeKeeper]

  - id: INTAKE_ROUTE_EXECUTE
    description: Flux standard route -> execute -> archive
    actors: [OPS-RouterIA, OPS-PlaybookRunner, OPS-DossierIA]

