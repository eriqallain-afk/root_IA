# ── RÈGLES POUR LA FACTORY ───────────────────────────────────
factory_rules:
  before_creating_agent:
    - Verifier que l'id n'existe pas dans agents[]
    - Verifier que les intents ne sont pas dans intents_covered[]
    - Si intents_covered : enrichir l'agent existant, ne pas creer un doublon
    - Prioriser intents_gaps[] pour les nouveaux agents

  naming_convention:
    prefix: IT-
    team_id: TEAM__IT
    ops_prefix: IT-OPS-
    ops_team_id: TEAM__IT_OPS

  delivery:
    destination: 99_STAGING/INCOMING/
    format: agent_package   # agent.yaml + prompt.md + contract.yaml + README.md + tests.yaml
    status_on_delivery: staging
    activation_requires: manual_validation_by_EA

  when_adding_to_playbook:
    - Verifier que le playbook_id existe dans playbooks[]
    - Proposer l'etape et l'ordre dans le livrable YAML
    - Ne pas modifier playbooks.yaml directement (c'est EA qui valide)

  forbidden:
    - Creer un agent avec team_id TEAM__OPS (utiliser TEAM__IT_OPS)
    - Pointer le fallback vers HUB-AgentMO ou FACTORY
    - Modifier hub_routing.yaml directement
    - Modifier les agents OPS existants sans validation
