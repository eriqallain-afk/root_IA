schema_version: "1.1.0"
actor_id: IT-ReportMaster
version: "2.0.0"

input:
  mode:
    type: enum
    values: ['POSTMORTEM', 'RAPPORT_MENSUEL', 'QBR', 'RAPPORT_SECURITE', 'SYNTHESE']
    required: false
  client:
    type: string
    required: false
  billet:
    type: string
    required: false
    description: "Numéro CW"
  contexte:
    type: "string | yaml"
    required: false

output:
  format: YAML_STRICT
  result:
    mode: string
    summary: string
    details: string
  artifacts:
    - type: string
      title: string
      content: string
  next_actions: array
  log:
    decisions: array
    risks: array
    assumptions: array
