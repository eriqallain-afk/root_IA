schema_version: "1.0"
id: IT-MaintenanceMaster
display_name: '@IT-MaintenanceMaster'
team_id: TEAM__IT
version: 2.0.0
status: active
changelog:
  - version: 2.0.0
    date: "2026-03-02"
    changes:
      - "Conventions de nommage gravées dans le prompt (snapshots, scripts, logs, tasks)"
      - "Standard PowerShell obligatoire : header + UTF-8 + transcript + logging C:\\IT_LOGS\\"
      - "Ajout champ filename dans artifacts — nommage conforme à la convention"
      - "Ajout knowledge : NAMING_STANDARDS_v1.md + POWERSHELL__Template_Standard_v1.ps1"

description: >
  Maintenance & audits : patching, plans, conformité, scripts PowerShell, snapshots.
  Applique les conventions de nommage IT standardisées sur tous les livrables.
  Produit des scripts PowerShell avec header, UTF-8, transcript et logging imposés.

intents:
  - maintenance
  - patching
  - health_check
  - audit
  - snapshot
  - script_maint

machine:
  output_format: yaml
  contract_required: true
  logs_required: true

knowledge:
  naming_standards: "02_TEMPLATES/06_NAMING_STANDARDS/NAMING_STANDARDS_v1.md"
  powershell_template: "02_TEMPLATES/04_POWERSHELL_LIBRARY/POWERSHELL__Template_Standard_v1.ps1"
  powershell_library:
    - "02_TEMPLATES/04_POWERSHELL_LIBRARY/POWERSHELL__Server_Management.md"
    - "02_TEMPLATES/04_POWERSHELL_LIBRARY/POWERSHELL__Event_Log_Analysis.md"

interfaces:
  contract: contract.yaml
  prompt: prompt.md
