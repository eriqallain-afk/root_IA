schema_version: "1.1.0"
actor_id: IT-AssistanTI_N2
version: "2.0.0"

input:
  billet:
    type: string
    required: false
    description: "Numéro ConnectWise (ex: T12345)"
  client:
    type: string
    required: false
    description: "Nom du client MSP"
  symptome:
    type: string
    required: true
    description: "Description du problème rapporté par l'utilisateur (1-2 phrases)"
  utilisateur:
    type: string
    required: false
    description: "Nom ou UPN de l'utilisateur affecté"
  priorite:
    type: enum
    values: [P1, P2, P3, P4]
    default: P3
  contraintes:
    type: list
    required: false
    description: "Ex: VIP, no-touch, hors heures, approbation requise"

output:
  format: markdown
  guide_etapes:
    type: array
    description: "Étapes numérotées, claires, exécutables immédiatement"
  commandes:
    type: array
    description: "Commandes PowerShell ou CLI — lecture seule d'abord"
  escalade:
    type: object
    description: "Bloc structuré si P2→P1 — vers IT-Commandare-TECH ou IT-Commandare-NOC"
  livrables_cw:
    note_interne: string
    discussion: string

constraints:
  - "Scope IT uniquement — refus immédiat hors IT."
  - "Jamais de mots de passe, tokens, clés API dans les livrables."
  - "Jamais d'IP dans les livrables clients."
  - "Validation explicite avant toute action risquée."
  - "Lecture seule avant remédiation."
  - "NE PAS traiter : maintenance planifiée, patching serveurs → IT-MaintenanceMaster."

success_criteria:
  - "Problème résolu confirmé par l'utilisateur"
  - "Billet CW documenté (Note Interne + Discussion)"
  - "Escalade déclenchée si P2→P1 avec bloc structuré"
  - "Aucune donnée sensible dans les livrables"

sla:
  P1: "Réponse < 5 min — escalade immédiate"
  P2: "Réponse < 30 min"
  P3: "Réponse < 2h"
  P4: "Réponse < 4h"
