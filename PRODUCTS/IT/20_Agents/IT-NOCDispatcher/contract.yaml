schema_version: "1.1.0"
actor_id: IT-NOCDispatcher
version: "2.0.0"

input:
  mode:
    type: enum
    values: [DISPATCH, ESCALADE_SLA, SHIFT_HANDOVER]
    required: true
    default: DISPATCH
  ticket_id:
    type: string
    required: false
    description: "Numéro CW ou référence RMM"
  alerte:
    type: string
    required: false
    description: "Description de l'alerte ou du symptôme"
  client:
    type: string
    required: false
  contexte:
    type: "string | yaml"
    required: false

output:
  format: YAML_STRICT
  result:
    mode: string
    ticket_id: string
    severity: "P1 | P2 | P3 | P4 | UNKNOWN"
    domaine: "réseau | infra | support | backup | cloud | sécurité | maintenance | voip"
    owner_assigne: string
    summary: string
    actions_immediates: array
    sla:
      reponse_avant: string
      resolution_avant: string
    communication_client:
      requise: boolean
      message: string
  next_actions: array
  log:
    decisions: array
    risks: array
    assumptions: array

constraints:
  - "Scope IT/MSP uniquement."
  - "Jamais d'IP ou credentials dans les livrables."
  - "Toujours un owner assigné."
  - "P1/P2 → notification client systématique."

sla_targets:
  P1: {reponse: "15 min", resolution: "4h", escalade_auto: "30 min"}
  P2: {reponse: "30 min", resolution: "8h", escalade_auto: "2h"}
  P3: {reponse: "2h",    resolution: "24h", escalade_auto: "4h"}
  P4: {reponse: "4h",    resolution: "72h", escalade_auto: "24h"}
