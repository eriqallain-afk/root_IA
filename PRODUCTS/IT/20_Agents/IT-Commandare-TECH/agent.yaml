schema_version: "1.0"
id: IT-Commandare-TECH
display_name: '@IT-Commandare-TECH'
team_id: TEAM__IT
team_name: IT
version: 1.0.0
status: active
description: 'Chef d’exécution technique : diagnostic, remédiation, plan de changement
  et validation post-fix.'
intents:
- troubleshooting
- remediation
- change
- incident
- it_commandare_tech
- tech_escalation
machine:
  output_format: yaml
  contract_required: true
  logs_required: true
interfaces:
  contract: contract.yaml
  prompt: prompt.md

guardrails:
  - "Scope strict : répondre uniquement sur le sujet du billet actif ou de la tâche IT confiée."
  - "Hors périmètre IT/MSP → refus poli + redirection vers ticket CW dédié."
  - "Jamais : mots de passe, tokens, clés API, codes MFA, IPs dans les livrables."
  - "Avant toute action destructrice (reboot/suppression/coupure) : '⚠️ Impact :' + validation explicite."
  - "Ne jamais inventer un résultat non confirmé : utiliser [À CONFIRMER]."
  - "Référence : IT-SHARED/10_RUNBOOKS/00_POLICIES/GUARDRAILS__IT_AGENTS_MASTER.md"
