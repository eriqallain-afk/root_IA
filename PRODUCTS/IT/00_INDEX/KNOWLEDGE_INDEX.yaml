    description: Templates fiches objets IT pour Hudu (Notes-Editor, Services, champs)
    consumers:
      - IT-ClientDocMaster

  reference_hudu:
    path: IT-SHARED/50_REFERENCE/REFERENCE__EDOCS_STANDARD.md
    description: Standard edocs Hudu — taxonomie, règles de liaison, conventions
    consumers:
      - IT-ClientDocMaster
      - IT-MaintenanceMaster

agents:
  IT-MaintenanceMaster:
    path: 20_Agents/IT-MaintenanceMaster/05_KNOWLEDGE/
    description: Maintenance MSP complète (patching, DR, health check, scripts PS)
    priority: high
    auto_load: true
    contexts:
      - 01_TEMPLATES
      - 02_RUNBOOKS
      - 02_TEMPLATES
      - 03_CHECKLISTS

  IT-CloudMaster:
    path: 20_Agents/IT-CloudMaster/knowledge/
    description: Azure AD, M365, cloud governance, Entra ID
    priority: high
    auto_load: true

  IT-Commandare-NOC:
    path: 20_Agents/IT-Commandare-NOC/IT_Commandare_NOC_KnowledgePack_v1/
    description: NOC — triage, alertes, sévérité, runbooks réponse
    priority: high
    auto_load: true

  IT-Commandare-OPR:
    path: 20_Agents/IT-Commandare-OPR/IT_Commandare_OPR_KnowledgePack_v1/
    description: Opérations — gouvernance, change, communication client
    priority: high
    auto_load: true

  IT-Commandare-TECH:
    path: 20_Agents/IT-Commandare-TECH/IT_Commandare_TECH_KnowledgePack_v1/
    description: Technique — RCA, troubleshooting avancé, remédiation
    priority: high
    auto_load: true

  IT-Commandare-Infra:
    path: 20_Agents/IT-Commandare-Infra/IT_Commandare_INFRA_KnowledgePack_v1/
    description: Infrastructure — incidents serveurs, VM, DC/AD, réseau infra
    priority: high
    auto_load: true

  IT-ClientDocMaster:
    path: 20_Agents/IT-ClientDocMaster/
    description: Documentation Hudu — Notes-Editor, Services, champs structurés par objet IT client
    priority: high
    auto_load: true
    knowledge_files:
      - 20_Agents/IT-ClientDocMaster/prompt.md
      - IT-SHARED/20_TEMPLATES/TEMPLATE__EDOCS_FICHE_OBJET_IT.md
      - IT-SHARED/50_REFERENCE/REFERENCE__EDOCS_STANDARD.md

loading_rules:
  - auto_load agents with auto_load=true on agent startup
  - load shared.checklists for all agents with live interaction
  - load shared.templates_cw for all ticket-producing agents
  - load shared.templates_hudu and shared.reference_hudu for IT-ClientDocMaster
  - agent-specific pack overrides shared when conflict
