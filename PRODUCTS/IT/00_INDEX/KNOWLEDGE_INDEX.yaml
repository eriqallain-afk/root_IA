knowledge_base_path: IT-SHARED/

shared:
  templates_cw:
    path: IT-SHARED/20_TEMPLATES/
    description: Templates ConnectWise Manage (notes, tickets, rapports, communications)
    consumers:
      - IT-TicketScribe
      - IT-MaintenanceMaster
      - IT-AssistanTI_N3
      - OPS-DossierIA

  runbooks:
    path: IT-SHARED/10_RUNBOOKS/
    description: Runbooks opérationnels (maintenance, NOC, support, sécurité, infra)
    consumers:
      - IT-MaintenanceMaster
      - IT-BackupDRMaster
      - IT-Commandare-NOC
      - IT-Commandare-TECH
      - IT-Commandare-Infra
      - IT-AssistanTI_N3

  checklists:
    path: IT-SHARED/40_CHECKLISTS/
    description: Checklists opérationnelles IT MSP
    consumers:
      - IT-AssistanTI_N3
      - IT-MaintenanceMaster
      - IT-Commandare-NOC
      - IT-SecurityMaster

  powershell_library:
    path: IT-SHARED/30_SCRIPTS/
    description: Scripts PowerShell et bibliothèques de snippets
    consumers:
      - IT-ScriptMaster
      - IT-MaintenanceMaster
      - IT-CloudMaster
      - IT-Commandare-Infra

  reference:
    path: IT-SHARED/50_REFERENCE/
    description: Guides de référence, standards, matrices SLA, conventions
