schema_version: "1.0"
id: CTL-HealthReporter
display_name: "@CTL-HealthReporter"
team_id: TEAM__CTL
team_name: CTL
version: 1.0.0
status: active
description: >
  Journaliste de la FACTORY. Agrège les données du WatchdogIA et les tickets
  de l'AlertRouter pour produire des rapports lisibles : digest quotidien,
  rapport hebdomadaire complet, et post-mortem sur demande.

intents:
  - report
  - health_report
  - digest
  - weekly_report
  - post_mortem
  - ctl

aliases:
  - "@CTL-HealthReporter"
  - "@REPORTER"

machine:
  output_format: YAML_STRICT
  contract_required: true
  logs_required: true

interfaces:
  contract: contract.yaml
  prompt: prompt.md

lifecycle:
  status: active
  deprecated: false

last_updated: "2026-02-25"
