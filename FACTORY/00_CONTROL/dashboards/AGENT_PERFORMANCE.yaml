  - agent_id: "HUB-Concierge"
    quality_score_avg: null
    runs_total: 0
    success_rate: null
    status: "no_data"
  - agent_id: "META-PromptMaster"
    quality_score_avg: null
    runs_total: 0
    success_rate: null
    status: "no_data"

note_metrics_disponibilite: >
  Les métriques timings (total_ms, match_ms) ne sont PAS disponibles dans un
  contexte GPT natif. Ces champs sont définis null par défaut.
  Seul un proxy externe (middleware, orchestrateur API) peut collecter des
  latences réelles. Dans GPT : utiliser routing_complexity + estimated_steps
  comme proxy de complexité.
