schema_version: "1.0"
dashboard_id: AGENT_PERFORMANCE
description: "Performance individuelle de chaque agent — quality_score, intents, escalades"
owner: TEAM__CTL
updated_at: "2026-03-08"

# ============================================================
# STRUCTURE DE SUIVI — à remplir par CTL-HealthReporter
# ============================================================
metrics_schema:
  per_agent:
    agent_id:
      type: string
      example: "OPS-RouterIA"
    quality_score_avg:
      type: float
      range: "0.0-10.0"
      source: "log.quality_score de chaque run"
    quality_score_min:
      type: float
    quality_score_trend: "stable | improving | degrading"
    runs_total: 0
    runs_success: 0
    runs_failed: 0
    runs_escalated: 0
    success_rate:
      formula: "runs_success / runs_total"
    top_intents_served: []
    escalation_rate:
      formula: "runs_escalated / runs_total"
    last_seen: null

thresholds:
  quality_score_warning: 7.0   # En dessous → alerte CTL-AlertRouter
  quality_score_critical: 5.0  # En dessous → escalade immédiate
  escalation_rate_warning: 0.20
  success_rate_warning: 0.80

