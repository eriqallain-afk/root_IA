# ════════════════════════════════════════════════════════════════
# SECTION 4 — RÈGLES CTL-WATCHDOG
# ════════════════════════════════════════════════════════════════
watchdog_rules:

  visibility_mechanism:
    static_files_to_load:
      - 00_INDEX/KNOWLEDGE_INDEX.yaml        # Ce fichier
      - FACTORY_MANIFEST.yaml                # État produit
      - 00_INDEX/product.yaml                # Manifeste produit
      - 80_MACHINES/hub_routing.yaml         # Routes actives
      - playbooks/playbooks.yaml             # Playbooks
    intercept_point: BEFORE OPS-RouterIA
    cannot_read:
      - agents/*/prompt.md                   # Isolation sécurité (prompts privés)

  health_checks:
    - check: router_availability
      agent: OPS-RouterIA
      condition: Doit répondre sur tout intent
      alert_to: IT-CTOMaster

    - check: fallback_integrity
      agent: IT-OrchestratorMSP
      condition: Fallback doit jamais pointer vers FACTORY ou HUB global
      alert_to: IT-CTOMaster

    - check: sla_compliance
      agents: [IT-Commandare-NOC, IT-NOCDispatcher]
      condition: >
        P1 acknowledge < 5min, P2 < 15min
      alert_to: IT-CTOMaster

    - check: knowledge_pack_freshness
      agents: [IT-Commandare-NOC, IT-Commandare-TECH, IT-MaintenanceMaster]
      condition: Packs chargés et non vides
      alert_to: IT-CTOMaster

    - check: duplicate_agent_detection
      condition: Aucun intent couvert par deux agents sans routage explicite
      source: FACTORY_MANIFEST.yaml intents_covered[]
      alert_to: IT-CTOMaster

  alert_escalation_chain:
    L1: IT-Commandare-NOC         # Alerte opérationnelle
    L2: IT-Commandare-TECH        # Problème technique
    L3: IT-CTOMaster              # Escalade stratégique
    L4: IT-DirecteurGeneral       # Direction

  governance_gaps:
    description: Intents non couverts — opportunités de nouveaux agents
    gaps:
      - itsm_change_advisory
      - vendor_management
      - contract_renewal
      - onboarding_client
      - offboarding_client
      - capacity_planning
      - compliance_audit
      - license_optimization
      - cost_analysis_it

  forbidden_actions:
    - Créer un agent avec team_id TEAM__OPS (utiliser TEAM__IT_OPS)
    - Pointer le fallback vers HUB-AgentMO ou FACTORY
    - Modifier hub_routing.yaml directement (EA requis)
    - Modifier les agents OPS sans validation EA

