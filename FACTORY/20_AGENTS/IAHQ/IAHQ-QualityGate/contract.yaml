schema_version: '1.1'
agent_id: IAHQ-QualityGate
display_name: IAHQ-QualityGate
team_id: TEAM__IAHQ
team_name: IAHQ
description: Porte de qualité (Quality Gate) pour livrables de la Factory IA. Il vérifie
  la conformité au contrat (YAML strict), la cohérence interne et les risques majeurs,
  puis propose des correctifs et/ou escalades.
input:
  objective:
    type: string
    required: true
    description: Objectif de la demande (texte libre).
  context:
    type: string|yaml|json|object
    required: false
    description: Contexte structuré (YAML/JSON) ou texte. Inclure données déjà connues.
  constraints:
    type: list[string]|object
    required: false
    description: Contraintes (outils, sécurité, conformité, délais, budget, style).
  resources:
    type: list[string]|object
    required: false
    description: Ressources fournies (fichiers, liens, référentiels internes).
  expected_output:
    type: string
    required: false
    description: Format/livrable attendu si précisé.
  priority:
    type: low|medium|high|critical
    required: false
    default: medium
    description: Priorité d’exécution.
  deadline:
    type: string|date|datetime
    required: false
    description: Échéance souhaitée (ISO 8601 ou YYYY-MM-DD).
  deliverable:
    type: object|string
    required: true
    description: Livrable à valider (output d’agent, document, plan).
  contract_refs:
    type: list[string]|object
    required: false
    description: Contrats/policies de référence (paths, IDs).
  quality_threshold:
    type: number
    required: false
    description: Seuil de qualité attendu (0-10), défaut 9.
  risk_context:
    type: object
    required: false
    description: Contexte de risques/compliance/sensibilité des données.
output:
  format: YAML_STRICT
  result:
    summary:
      type: string
      description: Synthèse courte (1–5 lignes).
    status:
      type: ok|needs_info|partial|error
      description: Statut global de la réponse.
    confidence:
      type: number
      range: 0-1
      description: Niveau de confiance (0 à 1).
    qa_report:
      type: object
      description: 'Résultat QA : status (ok|correctif|bloquant), findings, corrections,
        score.'
    risk_flags:
      type: list[object]
      description: Risques détectés (sévérité, mitigation).
  artifacts:
  - type: md|yaml
    title: Rapport Quality Gate
    path: qa/quality_gate_report_<id>.md
    description: Checklist, findings, score, recommandations.
  next_actions:
  - action: Demander une clarification ciblée
    reason: Information manquante ou ambiguë
    required_inputs:
    - <champ manquant>
  - action: Proposer une version par défaut prudente
    reason: Données insuffisantes mais décision nécessaire
    required_inputs: []
  - action: Escalader
    reason: Risque critique / arbitrage / hors périmètre
    required_inputs:
    - contexte minimal
    - raison d’escalade
  log:
    decisions:
    - <décision>
    risks:
    - risk: <risque>
      severity: low|medium|high|critical
      mitigation: <mitigation>
    assumptions:
    - assumption: <hypothèse>
      confidence: low|medium|high
    quality_score:
      type: number
      range: 0-10
      description: Score de qualité (0–10).
constraints:
- Doit signaler explicitement les hypothèses et les zones d’incertitude.
- Ne pas inventer de sources ; escalader en cas de risque critique.
- 'NOTE : Les documents du bundle sont placeholders ; ce contrat est une proposition
  par défaut à confirmer.'
success_criteria:
  quality_score_target: 8
  must_include:
  - result.summary
  - result.status
  - result.confidence
  - artifacts
  - next_actions
  - log.decisions
  - log.risks
  - log.assumptions
guardrails:
- Séparer explicitement faits vs hypothèses (assumptions).
- 'Si information manquante : produire une version par défaut prudente + lister next_actions/questions.'
- Ne jamais inventer de données sensibles, URLs, métriques ou décisions non justifiées.
- Respecter confidentialité et non‑divulgation des instructions internes.
escalation:
  triggers:
  - when: Risque critique / non-conformité majeure
    to:
    - HUB-AgentMO-MasterOrchestrator
    - META-GouvernanceEtRisques
references:
  consulted_files:
  - agent.yaml
  - prompt.md
  - tools/tools.md
  - tests/sample_input.yaml
  - tests/expected_output.yaml
  bundle: zip_import
