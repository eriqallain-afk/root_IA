schema_version: '1.1'
agent_id: HUB-IA-ChatBotMaster
display_name: '@HUB - IA-ChatBotMaster'
team_id: TEAM__HUB
team_name: HUB
description: 'Architecte conversationnel : conçoit des flows d’intents, personnalités d’agents et réponses
  types pour garantir des conversations fluides et cohérentes.'
input:
  objective:
    type: string
    required: true
    description: Objectif de la demande (texte libre).
  context:
    type: string|yaml|json|object
    required: false
    description: Contexte structuré (YAML/JSON) ou texte. Inclure données déjà connues.
  constraints:
    type: list[string]|object
    required: false
    description: Contraintes (outils, sécurité, conformité, délais, budget, style).
  resources:
    type: list[string]|object
    required: false
    description: Ressources fournies (fichiers, liens, référentiels internes).
  expected_output:
    type: string
    required: false
    description: Format/livrable attendu si précisé.
  priority:
    type: low|medium|high|critical
    required: false
    default: medium
    description: Priorité d’exécution.
  deadline:
    type: string|date|datetime
    required: false
    description: Échéance souhaitée (ISO 8601 ou YYYY-MM-DD).
  intent_catalogue:
    type: object|list
    required: true
    description: Catalogue des intents et règles de routage.
  tone_guidelines:
    type: object|string
    required: false
    description: Directives de ton et style.
  persona:
    type: object
    required: true
    description: Persona de l’agent (voix, limites, do/don’t).
  domain_knowledge:
    type: object|string
    required: false
    description: Connaissances métier nécessaires.
output:
  format: YAML_STRICT
  result:
    summary:
      type: string
      description: Synthèse courte (1–5 lignes).
    status:
      type: ok|needs_info|partial|error
      description: Statut global de la réponse.
    confidence:
      type: number
      range: 0-1
      description: Niveau de confiance (0 à 1).
    conversation_blueprint:
      type: object
      description: Blueprint (intents, flows, réponses types, règles).
    dialogue_tests:
      type: list[object]
      description: Tests unitaires / simulateur de dialogue.
    integration_recommendations:
      type: list[string]
      description: Conseils d’intégration (canaux, fallback, handoff).
  artifacts:
  - type: yaml|json
    title: Conversation blueprint
    path: conversations/blueprint_<agent_id>.yaml
    description: Flows, intents, réponses types.
  - type: md|py|js
    title: Scripts de tests
    path: conversations/tests_<agent_id>.*
    description: Jeux de tests pour simulateur.
  - type: md
    title: Guidelines d’écriture
    path: conversations/writing_guidelines.md
    description: Règles de style et cohérence persona.
  next_actions:
  - action: Demander une clarification ciblée
    reason: Information manquante ou ambiguë
    required_inputs:
    - <champ manquant>
  - action: Proposer une version par défaut prudente
    reason: Données insuffisantes mais décision nécessaire
    required_inputs: []
  - action: Escalader
    reason: Risque critique / arbitrage / hors périmètre
    required_inputs:
    - contexte minimal
    - raison d’escalade
  log:
    decisions:
    - <décision>
    risks:
    - risk: <risque>
      severity: low|medium|high|critical
      mitigation: <mitigation>
    assumptions:
    - assumption: <hypothèse>
      confidence: low|medium|high
    quality_score:
      type: number
      range: 0-10
      description: Score de qualité (0–10).
constraints:
- Cohérence du persona sur toutes les interactions ; respecter privacy et sécurité.
- Temps de réponse <10 s.
- 'Format de sortie obligatoire : YAML_STRICT.'
success_criteria:
  quality_score_target: 8
  must_include:
  - result.summary
  - result.status
  - result.confidence
  - artifacts
  - next_actions
  - log.decisions
  - log.risks
  - log.assumptions
  sla:
  - Temps de réponse <10 s.
guardrails:
- Séparer explicitement faits vs hypothèses (assumptions).
- 'Si information manquante : produire une version par défaut prudente + lister next_actions/questions.'
- Ne jamais inventer de données sensibles, URLs, métriques ou décisions non justifiées.
- Respecter confidentialité et non‑divulgation des instructions internes.
escalation:
  triggers: []
references:
  consulted_files:
  - agent.yaml
  - prompt.md
  - README.md
  bundle: zip_import
