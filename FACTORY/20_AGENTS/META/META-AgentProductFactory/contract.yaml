schema_version: "1.1"
agent:
  id: META-AgentProductFactory
  team_id: TEAM__META
  status: active

description: >
  Générateur industriel d'agents root_IA. Produit des dossiers agents complets
  et des Deliverable Packs réutilisables conformes aux standards FACTORY.

mission: >
  Industrialiser la création, la validation et l'assemblage de dossiers agents
  root_IA à partir de specs, catalogues de rôles, ou composants existants.

responsibilities:
  - "Lire une spec et produire un dossier agent complet conforme aux standards"
  - "Générer Deliverable Packs (templates + runbooks + checklists + exemples)"
  - "Auditer et scorer des packages existants (qualité + conformité)"
  - "Adapter contrats existants pour des clones d'agents"
  - "Assembler composants séparés en dossier agent déployable"

input:
  mode:
    type: "enum(agent_package | deliverable_pack | validation_report | adapt_contract | assemble_agent)"
    required: true
    description: "Mode d'opération déterminant le workflow interne et les outputs."

  agent_spec:
    type: "object|yaml"
    required: false
    description: "Spec d'un agent unique (id, mission, team_id, intents, contraintes, domaine)."
    required_if: "mode IN [agent_package, adapt_contract]"

  catalogue_roles:
    type: "array<object>|yaml"
    required: false
    description: "Catalogue d'agents (output META-CartographeRoles) pour génération en lot."

  deliverable_spec:
    type: "object|yaml"
    required: false
    description: "Spec d'un livrable (nom, domaine, format, utilisateurs, exemples)."
    required_if: "mode == deliverable_pack"

  existing_package:
    type: "object|yaml"
    required: false
    description: "Package existant à auditer (agent.yaml + contract.yaml + prompt.md)."
    required_if: "mode == validation_report"

  source_contract:
    type: "yaml"
    required: false
    description: "Contrat source pour adaptation (mode adapt_contract)."
    required_if: "mode == adapt_contract"

  components:
    type: "object"
    required: false
    description: "Composants séparés à assembler (prompt, contract, agent_yaml, tests)."
    required_if: "mode == assemble_agent"

  target_path:
    type: "string"
    required: false
    description: "Chemin cible dans la FACTORY. Ex: 20_AGENTS/DAM/DAM-Conformite/"

  constraints:
    type: "array<string>"
    required: false
    description: "Contraintes additionnelles (sécurité, domaine, langue, format)."

  quality_target:
    type: "number"
    required: false
    default: 9.0
    description: "Score qualité minimum attendu (0-10). Défaut 9.0."

output:
  output_format: YAML_STRICT

  result:
    summary:
      type: string
      description: "Résumé 1-3 lignes de ce qui a été produit."
    status:
      type: "enum(ok | needs_clarification | partial | error)"
    mode_executed:
      type: string
      description: "Mode réellement exécuté."
    quality_score:
      type: object
      fields:
        overall: "number (0-10)"
        clarity: "number (0-10)"
        precision: "number (0-10)"
        testability: "number (0-10)"
        compliance: "number (0-10)"

  package:
    type: object
    description: "Package produit selon le mode."
    fields:
      kind: "enum(agent_package | deliverable_pack | validation_report | adapted_contract | assembled_agent)"
      files:
        type: "array<object>"
        item_fields:
          path: "string — chemin relatif dans la FACTORY"
          type: "enum(yaml | md | json)"
          content: "string — contenu complet prêt à copier"
          required: boolean

  artifacts:
    type: "array<object>"
    description: "Liste des artefacts avec chemins FACTORY valides."
    item_schema:
      path: "20_AGENTS/<TEAM>/<ID>/<fichier>"
      type: "enum(yaml | md)"
      title: string
      required: boolean

  next_actions:
    type: "array<string>"
    description: "Actions suivantes recommandées (upload, validation, intégration index)."

  log:
    decisions: "array<string>"
    risks: "array<string>"
    assumptions: "array<string>"
    unknowns: "array<string>"
    quality_score:
      overall: "number (0-10)"
      clarity: "number (0-10)"
      completeness: "number (0-10)"
      compliance: "number (0-10)"

artifacts:
  - type: yaml
    title: "Dossier agent généré"
    path: "20_AGENTS/<TEAM>/<agent_id>/agent.yaml"
    required: true
  - type: yaml
    title: "Contrat I/O généré"
    path: "20_AGENTS/<TEAM>/<agent_id>/contract.yaml"
    required: true
  - type: md
    title: "Prompt généré"
    path: "20_AGENTS/<TEAM>/<agent_id>/prompt.md"
    required: true
  - type: yaml
    title: "Suite de tests"
    path: "20_AGENTS/<TEAM>/<agent_id>/tests/tests.yaml"
    required: false

constraints:
  - "Sortie YAML strict uniquement — jamais de texte libre hors YAML"
  - "Logs obligatoires : decisions, risks, assumptions, unknowns"
  - "Zéro ressource inventée — si info manquante → log.unknowns + next_actions"
  - "Qualité minimum 9/10 — itérer dans la même réponse si score insuffisant"
  - "Chemins artifacts : 20_AGENTS/<TEAM>/<ID>/ uniquement"
  - "ID canon dans les fichiers générés = ID fourni dans agent_spec"
  - "Cohérence obligatoire : agent.yaml ↔ contract.yaml ↔ prompt.md"

metrics:
  quality_target: "≥ 9/10"
  yaml_validity: "100%"

success_criteria:
  - "Package généré avec tous les fichiers required"
  - "Quality score overall ≥ 9.0"
  - "Cohérence agent.yaml ↔ contract ↔ prompt vérifiée"
  - "Chemins artifacts valides dans la structure FACTORY"

guardrails:
  - "Ne jamais inclure de secrets ou données sensibles dans les fichiers générés"
  - "Ne jamais inventer d'agent_id, team_id ou intent non fournis"
  - "En cas d'info manquante critique : log.unknowns + next_actions, pas d'invention"

escalation:
  - trigger: "Quality score < 7"
    to: META-PromptMaster
    reason: "Refactoring prompt requis"
  - trigger: "YAML invalide dans les outputs"
    to: META-GouvernanceQA
    reason: "Audit syntaxe et conformité"
  - trigger: "Risques compliance ou sécurité détectés"
    to: META-GouvernanceQA
    reason: "Validation avant déploiement"
