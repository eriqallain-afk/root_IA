# ========================================
# NAMING CONVENTIONS
# ========================================

naming_rules:
  format: "verbe_nom"
  case: "snake_case"
  examples:
    - "generate_report"
    - "troubleshoot_server"
    - "validate_compliance"
  
  verbs_recommended:
    - generate
    - create
    - build
    - design
    - develop
    - analyze
    - diagnose
    - troubleshoot
    - assess
    - identify
    - detect
    - manage
    - maintain
    - monitor
    - coordinate
    - plan
    - schedule
    - optimize
    - track
    - notify
    - communicate
    - escalate
    - report
    - log
    - document
    - validate
    - check
    - verify
    - audit
    - test
    - review
    - conduct
    - execute
    - configure
    - refactor
    - add
    - recommend
    - assign
    - guide
    - alert
    - bundle
    - estimate
    - calculate
    
  avoid:
    - do (trop vague)
    - handle (trop générique)
    - process (pas spécifique)
    - manage_stuff (nom pas clair)

