  IT:
    when_to_use:
      - Infrastructure serveurs, réseau, cloud
      - Support IT et maintenance
      - Gestion Microsoft 365, Azure, AWS
      - Backup et disaster recovery
      - Monitoring et sécurité IT
    examples:
      - "Agent pour gérer patching serveurs"
      - "Agent pour générer rapports cloud Azure"
      - "Agent pour troubleshooter problèmes réseau"
      
  CONSTRUCTION:
    when_to_use:
      - Inspection bâtiments
