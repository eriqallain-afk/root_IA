# ========================================
# NAMING CONVENTIONS
# ========================================

naming_rules:
  team_id_format: "TEAM__<UPPERCASE>"
  examples:
    - TEAM__IT
    - TEAM__CONSTRUCTION
    - TEAM__EDU
    - TEAM__META
  
  agent_id_format: "<TEAM>-<AgentName>"
  examples:
    - IT-CloudMaster
    - CONSTRUCTION-InspectionBatiment
    - EDU-EvaluationCCQ
    - META-AgentFactory
  
  case_rules:
    team_id: "UPPERCASE with underscores"
    agent_name: "PascalCase (UpperCamelCase)"
    full_id: "kebab-case (TEAM-AgentName)"

# ========================================
# TEAM SELECTION GUIDE
# ========================================

