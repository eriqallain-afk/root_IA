    required: false
    description: Objectif/consigne (si fournie par lﾃ｢竄ｬ邃｢orchestrateur).
  user_input:
    type:
    - string
    - object
    required: true
    description: Texte brut ou YAML structurﾃδｩ de la requﾃδｪte.
  context:
