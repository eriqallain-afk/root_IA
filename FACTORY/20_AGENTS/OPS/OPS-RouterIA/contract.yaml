    required: false
    description: Historique de session, mﾃδｩtadonnﾃδｩes, intents prﾃδｩ-dﾃδｩtectﾃδｩs si disponibles.
  available_agents:
    type:
    - string
    - object
    required: false
    description: Index des agents (chemin ou contenu). Si absent, le Router doit demander au systﾃδｨme de le fournir.
  routing_table:
    type:
    - string
    - object
    required: false
    description: Table de routage (hub_routing.yaml) ou son contenu.
  constraints:
