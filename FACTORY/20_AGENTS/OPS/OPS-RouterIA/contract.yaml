      match_ms: int
      io_ms: int
artifacts:
  routing_log:FACTORY/20_AGENTS/OPS/OPS-RouterIA/artifacts/routing_log_<run_id>.yaml
  routing_metrics:FACTORY/20_AGENTS/OPS/OPS-RouterIA/artifacts/routing_metrics_<date>.yaml
success_criteria:
- Dﾃδｩcision de routage fournie avec target_agent ou target_playbook, ou fallback explicite.
- confidence_level cohﾃδｩrent avec les scores/ﾃδｩvidence.
- 'Traﾃδｧabilitﾃδｩ: log.decisions + matched_rules renseignﾃδｩs.'
- 'Respect SLA: total_ms < 1000 en routine.'
guardrails:
- Ne pas inventer dﾃ｢竄ｬ邃｢agents ou de playbooks absents de lﾃ｢竄ｬ邃｢index.
- Ne jamais poser plus dﾃ｢竄ｬ邃｢UNE question de clarification par requﾃδｪte.
- 'Si ambiguﾃδｯtﾃδｩ persistante: fallback HUB-Concierge + suggestion dﾃ｢竄ｬ邃｢intents possibles.'
- Sﾃδｩparer strictement faits (matching) et hypothﾃδｨses (intent infﾃδｩrﾃδｩ).
constraints:
  sla:
    simple_routing_ms_max: 1000
  quality_metrics:
    success_rate_min: 0.98
  must_consult:
  - 00_INDEX/agents_index.yaml
  - 00_INDEX/intents.yaml
  - 40_RUNBOOKS/dispatch_matrix.yaml
  - hub_routing.yaml
escalation:
- when: routing_table invalid or missing repeatedly
  to: HUB-AgentMO-MasterOrchestrator
  how: return status=failed with missing_fields
- when: conflict between dispatch_matrix and hub_routing
  to: HUB-AgentMO2-DeputyOrchestrator
  how: return status=needs_clarification + risk(high)
tests:
  unit_tests:
  - name: route_match_single_intent
    input:
      user_input: Je veux exﾃδｩcuter un playbook de crﾃδｩation dﾃ｢竄ｬ邃｢armﾃδｩe GPT
      context:
        intents:
        - run_playbook
    expected:
      result.status: success
      result.routing_decision.target_agent: OPS-PlaybookRunner
  - name: route_ambiguous_one_question
    input:
      user_input: Jﾃ｢竄ｬ邃｢ai besoin dﾃ｢竄ｬ邃｢aide
      context: {}
    expected:
      result.status: needs_clarification
      result.clarifying_question: string
  - name: route_no_match_fallback
    input:
      user_input: Quel est le menu du jour ?
      context: {}
    expected:
      result.status: fallback
      result.fallback.target_agent: HUB-Concierge
examples:
- input:
    user_input: 'Route cette requﾃδｪte vers le bon agent (intent: memory/archive).'
    context:
      intents:
      - memory
