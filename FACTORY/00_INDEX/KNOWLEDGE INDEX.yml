# ════════════════════════════════════════════════════════════════
# RÈGLES DE CHARGEMENT
# ════════════════════════════════════════════════════════════════
loading_rules:
  - rule: auto_load
    description: Charger automatiquement au démarrage les agents avec auto_load=true
    agents_concerned: [IT-Commandare-NOC, IT-Commandare-OPR, IT-Commandare-TECH,
                       IT-MaintenanceMaster, IT-CloudMaster, IT-MSPLiveAssistant,
                       IT-InterventionLive]

  - rule: shared_cw_templates
    description: Charger shared.templates_cw pour tout agent produisant des tickets CW
    trigger_intents: [ticket, intervention, live_assist, kb, comms]

  - rule: shared_checklists
    description: Charger shared.checklists pour tout agent avec interaction live
    trigger_intents: [live_intervention, intervention, triage, diagnostic]

  - rule: context_detection
    description: MaintenanceMaster charge le context_folder selon détection du contexte
    contexts: [HEALTH_CHECK, PATCHING, SHARED]

  - rule: pack_override
    description: Le knowledge pack agent-spécifique prend priorité sur le shared en cas de conflit

  - rule: watchdog_visibility
    description: >
      CTL-Watchdog charge ce fichier complet + FACTORY_MANIFEST.yaml +
      hub_routing.yaml pour avoir visibilité totale sur le produit.
      Ne charge PAS les prompt.md des agents (isolation sécurité).
