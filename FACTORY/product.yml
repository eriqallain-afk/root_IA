  description: >
    Chaque requête est analysée par OPS-RouterIA → intent détecté →
    agent métier sélectionné + playbook déclenché → OPS-PlaybookRunner
    exécute → OPS-DossierIA archive le livrable.

  flux_standard:
    - step: 1_intake
      actor: OPS-RouterIA
      action: Analyse intent + sélection agent + playbook

    - step: 2_execute
      actor: OPS-PlaybookRunner
      action: Déroule les étapes du playbook sélectionné

    - step: 3_archive
      actor: OPS-DossierIA
      action: Package le livrable en Dossier IA

  watchdog_integration:
    position: AVANT OPS-RouterIA
    actor: CTL-Watchdog (à créer)
    role: Supervision, audit, conformité, alertes

  commandare_layer:
    description: Couche d'orchestration entre routing et agents terrain
    actors:
