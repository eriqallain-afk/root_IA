  # ─── META : Créer une armée d'agents ───
  BUILD_ARMY:
    description: "Analyse un domaine et crée une équipe d'agents complète"
    trigger: "Besoin de créer une nouvelle équipe d'agents"
    steps:
      - step: analyse_besoins
        actor_id: META-CartographeRoles
        input_from: user
        success_criteria: "Blueprint avec agents identifiés et justifiés"
        on_failure: retry
      - step: create_agents
        actor_id: META-AgentFactory
        input_from: analyse_besoins
        success_criteria: "Package complet pour chaque agent (yaml + prompt + contract)"
        on_failure: retry
      - step: create_playbooks
        actor_id: META-PlaybookBuilder
        input_from: create_agents
        success_criteria: "Au moins 1 playbook par workflow identifié"
        on_failure: retry
      - step: qa_audit
        actor_id: META-GouvernanceQA
        input_from: create_agents
        success_criteria: "Tous les agents passent l'audit qualité"
        on_failure: retry
    deliverable:
      format: yaml
      contains: [agents, playbooks, audit_report]

  PB_HUB_01_ORCHESTRATE_AND_DISPATCH:
    display_name: "Orchestrate and Dispatch"
    category: orchestration
    team_owner: TEAM__HUB
    trigger: "any_request | manual | intake"
    duration_minutes: 30
    steps_count: 5
    version: "1.0.0"
    file: "30_PLAYBOOKS/PB_HUB_01_ORCHESTRATE_AND_DISPATCH.yaml"

  # ─── DAM : Analyse projet domiciliaire ───
  DAM_PROJECT_ANALYSIS:
    description: "Analyse complète d'un projet domiciliaire"
    trigger: "Nouveau projet de construction/rénovation"
    steps:
      - step: conformite
        actor_id: DAM-Conformite
        input_from: user
        success_criteria: "Check conformité complété avec status par catégorie"
        on_failure: abort
      - step: budget
        actor_id: DAM-Budget
        input_from: user
        success_criteria: "Analyse budgétaire avec ventilation et risques"
        on_failure: retry
      - step: planning
        actor_id: DAM-Planification
        input_from: user
        success_criteria: "Calendrier avec jalons et chemin critique"
        on_failure: retry
      - step: vendors
        actor_id: DAM-SousTraitants
        input_from: user
        success_criteria: "Évaluation des soumissions si disponibles"
        on_failure: skip
      - step: inspection
        actor_id: DAM-Inspection
        input_from: conformite
        success_criteria: "Plan d'inspection avec checklists"
        on_failure: retry
      - step: synthese
        actor_id: DAM-Orchestrator
        input_from: all_previous
        success_criteria: "Synthèse exécutive complète"
        on_failure: retry
    deliverable:
      format: yaml
      contains: [conformity_check, budget_analysis, project_schedule, inspection_plan, project_analysis]

   # ─── EDU : Évaluation CCQ ───
  EDU_CCQ_EVALUATE:
    description: "Évaluer une réflexion éthique CCQ (single)"
    trigger: "Copie CCQ à évaluer"
    steps:
      - step: extract
        actor_id: EDU-Extractor
        input_from: user
        success_criteria: "Texte extrait avec sections identifiées"
        on_failure: retry
      - step: evaluate
        actor_id: EDU-Evaluator
        input_from: extract
        success_criteria: "Évaluation avec scores, justifications et preuves textuelles"
        on_failure: retry
    deliverable:
      format: json
      contains: [extraction, evaluation]

  EDU_CCQ_BATCH:
    description: "Évaluer un lot de copies CCQ"
    trigger: "Lot de copies CCQ à évaluer"
    steps:
      - step: extract_batch
        actor_id: EDU-Extractor
        input_from: user
        success_criteria: "Toutes les copies extraites et segmentées"
        on_failure: retry
      - step: evaluate_batch
        actor_id: EDU-Evaluator
        input_from: extract_batch
        success_criteria: "Toutes les copies évaluées"
        on_failure: retry
      - step: compile
        actor_id: EDU-Orchestrator
        input_from: evaluate_batch
        success_criteria: "Rapport compilé avec statistiques"
        on_failure: retry
    deliverable:
      format: json
      contains: [extractions, evaluations, summary_report]

  # ─── IT : Intervention Live ───
  IT_INTERVENTION_LIVE:
    description: "Suivre une intervention IT en temps réel"
    trigger: "Technicien démarre une intervention"
    steps:
