id: PB_HUB_01_ORCHESTRATE_AND_DISPATCH
display_name: "Orchestrate and Dispatch"
version: "1.0.0"
category: orchestration
team_owner: TEAM__HUB
trigger: "any_request | manual | intake"
sla_minutes: 30
description: >
  Playbook d'entrée universel HUB. Prend toute requête utilisateur, la cadre,
  détecte l'intent, route vers le bon agent/équipe, et compile le résultat.
  Point d'entrée standard pour toutes les demandes non spécifiquement routées.

steps:
  - step: intake_and_route
    order: 1
    actor_id: HUB-Router
    description: "Détecter l'intent et choisir la destination optimale"
    input:
      from: user
      fields: [user_input, context]
    output:
      artifacts: [routing_decision.yaml]
      passes_to: qualify_if_ambiguous
    success_criteria:
      - "routing_decision.confidence IN [high, medium]"
      - "routing_decision.target_agent existe dans agents_index"
    on_failure: escalate
    escalation_target: HUB-Concierge

  - step: qualify_if_ambiguous
    order: 2
    actor_id: HUB-Concierge
    description: "Si confiance faible, qualifier le besoin (max 3 questions)"
    condition: "routing_decision.confidence == low"
    input:
      from: step_intake_and_route
      fields: [routing_decision, user_input]
    output:
      artifacts: [qualified_request.yaml]
      passes_to: orchestrate
    success_criteria:
      - "qualified_request.user_need défini"
      - "qualified_request.suggested_team défini"
    on_failure: retry_once

  - step: orchestrate
    order: 3
    actor_id: HUB-AgentMO-MasterOrchestrator
    description: "Cadrer, planifier et dispatcher vers l'équipe cible"
    input:
      from: step_intake_and_route
      fields: [routing_decision, qualified_request, user_input, context]
    output:
      artifacts: [orchestration_plan.yaml, report.md]
      passes_to: qa_review
    success_criteria:
      - "result.status IN [ok, partial]"
      - "result.confidence >= 0.7"
      - "artifacts non vides"
      - "log.quality_score >= 9"
    on_failure: escalate
    escalation_target: HUB-AgentMO2-DeputyOrchestrator

  - step: qa_review
    order: 4
    actor_id: HUB-AgentMO2-DeputyOrchestrator
    description: "Vérifier cohérence, qualité et complétude du plan"
    condition: "orchestration_plan.log.quality_score < 9 OR result.status == partial"
    input:
      from: step_orchestrate
      fields: [orchestration_plan, report]
    output:
      artifacts: [qa_report.yaml, corrected_plan.yaml]
      passes_to: archive
    success_criteria:
      - "qa_report.overall_status IN [pass, pass_with_warnings]"
    on_failure: abort

  - step: archive
    order: 5
    actor_id: OPS-DossierIA
    description: "Archiver le run complet dans le Dossier IA"
    input:
      from: step_orchestrate
      fields: [orchestration_plan, qa_report, execution_context]
    output:
      artifacts: [dossier_id, archive_confirmation.yaml]
      passes_to: final
    success_criteria:
      - "dossier_id non null"
    on_failure: skip

escalation_policy:
  trigger: on_failure_abort
  target: HUB-AgentMO-MasterOrchestrator
  notification: "Log dans OPS-DossierIA + alerte CTL-AlertRouter"

definition_of_done:
  - "Intent détecté avec confiance >= medium"
  - "Plan d'exécution produit (orchestration_plan.yaml)"
  - "Score qualité >= 9/10"
  - "Run archivé dans OPS-DossierIA"
  - "next_actions définis pour l'opérateur"

references:
  runbook: "40_RUNBOOKS/RUNBOOK__PB_HUB_01_ORCHESTRATE_AND_DISPATCH.md"
  playbooks_index: "30_PLAYBOOKS/playbooks.yaml"
  agents_consulted:
    - HUB-Router
    - HUB-Concierge
    - HUB-AgentMO-MasterOrchestrator
    - HUB-AgentMO2-DeputyOrchestrator
    - OPS-DossierIA
  policies_applied:
    - "50_POLICIES/quality_rules.md"
    - "50_POLICIES/naming.md"
    - "50_POLICIES/ops/sla.md"
